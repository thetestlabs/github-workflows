name: Terraform Security Checks

on:
  workflow_call:
    inputs:
      github_runner:
        description: 'Name of GitHub-hosted runner or self-hosted runner'
        default: 'ubuntu-latest'
        required: false
        type: string
      terraform_version:
        description: 'Terraform version used in github action'
        default: 'latest'
        required: false
        type: string
      terraform_working_directory:
        description: 'A relative path starting with "." that Terraform will execute within (e.g. "./infrastructure")'
        default: './terraform'
        required: false
        type: string
      enable_trivy_security:
        description: 'Enable Trivy to scan terraform code for security issues'
        default: true
        required: false
        type: boolean
      trivy_version:
        description: 'Trivy version to use in github action'
        default: 'latest'
        required: false
        type: string
      trivy_config_path:
        description: 'Path to Trivy config file (e.g. .trivyignore)'
        default: 'config/trivy/.trivyignore'
        required: false
        type: string
      enable_checkov_security:
        description: 'Enable Checkov to scan terraform code for security issues'
        default: true
        required: false
        type: boolean
      checkov_version:
        description: 'Checkov version to use in github action'
        default: 'latest'
        required: false
        type: string
      checkov_config_path:
        description: 'Path to Checkov config file (e.g. .checkov.yml)'
        default: 'config/checkov/.checkov.yml'
        required: false
        type: string
      commit_user:
        description: 'Username which should be used for commits by github action'
        default: 'github-actions'
        required: false
        type: string
      commit_email:
        description: 'Email which should be used for commits by github action'
        default: 'noreply@github.com'
        required: false
        type: string
      concurrency_group:
        description: 'Name of concurrency group to manage concurrent github action runs'
        default: ${{ github.repository }}/${{ github.event.pull_request.head.ref || github.ref }}/${{ inputs.terraform_working_directory }}
        required: false
        type: string
jobs:
  trivy-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Trivy — config scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: infra/
          exit-code: "1"
          severity: CRITICAL,HIGH
          trivyignores: .trivyignore

  terraform-plan:
    name: Terraform Plan
    runs-on: ubuntu-latest
    needs: trivy-scan
    steps:
      - uses: actions/checkout@v6
    
      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init (no backend)
        run: terraform init -backend=false -input=false
        working-directory: ${{ env.WORKING_DIR }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-2

      - name: Terraform Plan
        id: plan
        working-directory: ${{ env.WORKING_DIR }}
        run: |
          terraform plan -out=tfplan.binary
          terraform show -json tfplan.binary | jq > tfplan.json

      - name: Checkov
        uses: bridgecrewio/checkov-action@12
        with:
          working-directory: ${{ env.WORKING_DIR }}
          # directory: example/
          file: tfplan.json # optional: provide the path for resource to be scanned. This will override the directory if both are provided.
          # check: CKV_AWS_1 # optional: run only a specific check_id. can be comma separated list
          # skip_check: CKV_AWS_2 # optional: skip a specific check_id. can be comma separated list
          quiet: true # optional: display only failed checks
          soft_fail: true # optional: do not return an error code if there are failed checks
          framework: terraform # optional: run only on a specific infrastructure {cloudformation,terraform,kubernetes,all}
          # skip_framework: terraform # optional: skip a specific infrastructure {cloudformation,terraform,kubernetes,all}
          # skip_cve_package: CVE_2019_8331 # optional: skip a specific CVE package in SCA scans, can be comma separated list
          output_format: sarif # optional: the output format, one of: cli, json, junitxml, github_failed_only, or sarif. Default: sarif
          output_file_path: reports/results.sarif # folder and name of results file
          # output_bc_ids: true # optional: output Bridgecrew platform IDs instead of checkov IDs
          # download_external_modules: true # optional: download external terraform modules from public git repositories and terraform registry
          # repo_root_for_plan_enrichment: example/ #optional: Directory containing the hcl code used to generate a given terraform plan file. Use together with `file`
          # var_file: ./testdir/gocd.yaml # optional: variable files to load in addition to the default files. Currently only supported for source Terraform and Helm chart scans.
          log_level: DEBUG # optional: set log level. Default WARNING
          # config_file: path/this_file
          # baseline: cloudformation/.checkov.baseline # optional: Path to a generated baseline file. Will only report results not in the baseline.
          # container_user: 1000 # optional: Define what UID and / or what GID to run the container under to prevent permission issues
          # use_enforcement_rules: true # optional - use enforcement rule configs from the platform