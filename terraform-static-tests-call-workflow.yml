# Terraform CI — manual trigger until automated triggers are re-enabled.
#
# To re-enable automatic runs, uncomment the `push` and `pull_request` triggers.
#
# Required GitHub secrets:
#   AWS_ROLE_ARN   — IAM role ARN with permissions to read state + plan
#                    Must have the GitHub OIDC provider trusted as a principal.
#
# Jobs:
#   validate      — terraform fmt -check, init (no backend), validate
#   lint          — TFLint with AWS ruleset
#   security-scan — Trivy config scan + Checkov
#   test          — native terraform test (mock providers, no AWS needed)
#   plan-dev      — terraform plan against dev.tfvars (PRs only, posts comment)

name: Terraform Static Tests

on:
  # Automatic triggers commented out — enable once workflows are verified.
  # push:
  #   branches: [main]
  #   paths:
  #     - "infra/**"
  #     - ".github/workflows/terraform-*.yml"
  # pull_request:
  #   branches: [main]
  #   paths:
  #     - "infra/**"
  #     - ".github/workflows/terraform-*.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: terraform-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  TF_VERSION: "~1.14"
  WORKING_DIR: infra

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Cache Terraform plugins
        uses: actions/cache@v4
        with:
          path: ~/.terraform.d/plugin-cache
          key: ${{ runner.os }}-terraform-${{ hashFiles('infra/.terraform.lock.hcl') }}

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init (no backend)
        run: terraform init -backend=false -input=false

      - name: Terraform Validate
        run: terraform validate

  lint:
    name: TFLint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v6

      - uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: TFLint Init
        run: tflint --init --config "$(pwd)/.tflint.hcl"

      - name: TFLint Run
        run: tflint --recursive --config "$(pwd)/.tflint.hcl"

  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Trivy — config scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: infra/
          exit-code: "1"
          severity: CRITICAL,HIGH
          trivyignores: .trivyignore

      - name: Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infra/
          framework: terraform
          quiet: true
          soft_fail: true

  test:
    name: Terraform Tests
    runs-on: ubuntu-latest
    needs: validate
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}/modules/static-website
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init (for tests)
        run: terraform init -backend=false -input=false

      - name: Run Terraform Tests
        run: terraform test

  plan-dev:
    name: Plan Dev
    runs-on: ubuntu-latest
    needs: [validate, security-scan]
    permissions:
      id-token: write
      contents: read
      pull-requests: write
    defaults:
      run:
        working-directory: ${{ env.WORKING_DIR }}
    steps:
      - uses: actions/checkout@v6

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: eu-west-2

      - name: Terraform Init
        run: |
          terraform init \
            -input=false \
            -backend-config="key=timetolive-mhd-ecommerce/dev/terraform.tfstate"

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan \
            -var-file=environments/dev.tfvars \
            -no-color \
            -out=tfplan.out \
            2>&1 | tee /tmp/plan_output.txt
          echo "exit_code=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Post plan comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const raw = fs.readFileSync('/tmp/plan_output.txt', 'utf8');
            const body = raw.length > 60000
              ? raw.substring(0, 60000) + '\n\n_...output truncated..._'
              : raw;
            const outcome = '${{ steps.plan.outputs.exit_code }}' === '0' ? '✅ Success' : '❌ Failed';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## Terraform Plan — dev environment\n**Status:** ${outcome}\n\n<details>\n<summary>Plan output</summary>\n\n\`\`\`\n${body}\n\`\`\`\n</details>`,
            });

      - name: Fail if plan failed
        if: steps.plan.outputs.exit_code != '0'
        run: exit 1
